  <!-- Circuit/connection lines -->
  <g stroke="#ccc" stroke-width="2" opacity=".7">
    <line x1="100" y1="90" x2="150" y2="90"/>
    <line x1="150" y1="90" x2="150" y2="140"/>
    <line x1="330" y1="70" x2="330" y2="130"/>
    <line x1="330" y1="130" x2="400" y2="130"/>
    <line x1="100" y1="190" x2="150" y2="190"/>
    <line x1="150" y1="190" x2="150" y2="230"/>
    <line x1="400" y1="130" x2="400" y2="200"/>
    <line x1="400" y1="200" x2="450" y2="200"/>
  </g>

  <!-- Circuit nodes -->
  <g>
    <circle cx="100" cy="90" r="5" fill="#ccc"/>
    <circle cx="150" cy="140" r="5" fill="#ccc"/>
    <circle cx="330" cy="70" r="5" fill="#ccc"/>
    <circle cx="400" cy="130" r="6" fill="#dc2626" opacity=".5"/>
    <circle cx="100" cy="190" r="5" fill="#ccc"/>
    <circle cx="150" cy="230" r="5" fill="#ccc"/>
    <circle cx="450" cy="200" r="5" fill="#ccc"/>
  </g>

  <!-- Main monitor/screen — bigger -->
  <rect x="140" y="45" width="200" height="145" rx="0" fill="#0a0a0a"/>
  <rect x="146" y="51" width="188" height="128" rx="0" fill="#1a1a1a"/>
