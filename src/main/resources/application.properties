# ============================================
# File Upload Configuration
# ============================================

# 프로그램 파일 업로드 기본 경로 (서버 절대경로)
file.upload.base-path=/wonther3/tomcat/webapps/upload

# 프로그램 첨부파일 상대 경로 (base-path 하위)
file.upload.program-path=/program/files

# 썸네일 이미지 상대 경로 (base-path 하위)
file.upload.thumbnail-path=/program/thumbnails

# 허용 파일 확장자
file.upload.allowed-extensions=zip,exe,msi,dmg,tar,gz,7z,rar,pdf,doc,docx,xls,xlsx,ppt,pptx

# 허용 이미지 확장자 (썸네일)
file.upload.allowed-image-extensions=jpg,jpeg,png,gif,webp,bmp

# 최대 파일 크기 (bytes) - 100MB
file.upload.max-file-size=104857600

# 최대 이미지 크기 (bytes) - 10MB
file.upload.max-image-size=10485760
